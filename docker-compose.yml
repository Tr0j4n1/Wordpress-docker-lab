services:
  # ───────────────────────────────────────────────
  # MySQL 8.0  (Wordfence BBP default)
  # ───────────────────────────────────────────────
  db:
    container_name: mysql-wpd
    image: mysql:8.0.20
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      backend-wpd:
        aliases:
          - mysql

  # ───────────────────────────────────────────────
  # WordPress  (PHP 8.3 + XDebug — custom build)
  # ───────────────────────────────────────────────
  wordpress:
    container_name: wordpress-wpd
    restart: always
    build:
      context: ./xdebug
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      WORDPRESS_DB_HOST: mysql-wpd:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        /* Debug ──────────────────────────────── */
        define('WP_DEBUG',         true);
        define('WP_DEBUG_LOG',     true);
        define('WP_DEBUG_DISPLAY', true);
        /* Disable MySQL SSL (MariaDB client compat) */
        define('MYSQL_CLIENT_FLAGS', 0);
        /* Mailpit SMTP (via wp_mail) ──────────── */
        define('WPMS_ON',            true);
        define('WPMS_SMTP_HOST',     'mailpit');
        define('WPMS_SMTP_PORT',     1025);
        define('WPMS_MAILER',        'smtp');
        define('WPMS_SMTP_AUTH',     false);
        define('WPMS_SMTP_AUTOTLS',  false);
    volumes:
      - ./wp:/var/www/html
      - ./wp-content:/var/www/html/wp-content
    networks:
      - backend-wpd
      - frontend-wpd
    deploy:
      resources:
        limits:
          memory: 2048m
    extra_hosts:
      - host.docker.internal:host-gateway

  # ───────────────────────────────────────────────
  # WP-CLI automated setup  (runs once, then exits)
  # ───────────────────────────────────────────────
  wp-setup:
    image: wordpress:cli
    container_name: wp_setup
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    volumes:
      - ./wp:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./scripts:/scripts
    environment:
      WORDPRESS_DB_HOST: mysql-wpd:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    user: "0:0"
    entrypoint: ["/bin/bash", "/scripts/wp-setup.sh"]
    restart: "no"
    networks:
      - backend-wpd

  # ───────────────────────────────────────────────
  # WP-CLI  (ad-hoc commands: docker-compose run wpcli <cmd>)
  # ───────────────────────────────────────────────
  wpcli:
    image: wordpress:cli-php8.3
    container_name: wpcli-wpd
    volumes:
      - ./wp:/var/www/html
      - ./wp-content:/var/www/html/wp-content
    depends_on:
      - db
      - wordpress
    user: "33:33"
    entrypoint: wp
    command: "--info"
    environment:
      WORDPRESS_DB_HOST: mysql-wpd:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    networks:
      - backend-wpd
    profiles:
      - cli   # only starts when explicitly requested

  # ───────────────────────────────────────────────
  # Mailpit  (SMTP sink + web UI)
  # ───────────────────────────────────────────────
  mailpit:
    container_name: mailpit-wpd
    image: axllent/mailpit:latest
    restart: always
    networks:
      - backend-wpd
      - frontend-wpd
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ───────────────────────────────────────────────
  # phpMyAdmin  (DB admin UI)
  # ───────────────────────────────────────────────
  phpmyadmin:
    container_name: phpmyadmin-wpd
    image: phpmyadmin:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: mysql-wpd
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    networks:
      - backend-wpd
      - frontend-wpd

# ─────────────────────────────────────────────────
networks:
  frontend-wpd:
  backend-wpd:

volumes:
  db_data:
