services:
  # ───────────────────────────────────────────────
  # MySQL 8.0
  # ───────────────────────────────────────────────
  db:
    container_name: mysql-wpd-fpm
    image: mysql:8.0.20
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      backend-wpd:
        aliases:
          - mysql

  # ───────────────────────────────────────────────
  # WordPress  (PHP 8.3 FPM — no built-in XDebug)
  # Use this variant when you need Nginx in front
  # ───────────────────────────────────────────────
  wordpress:
    image: wordpress:php8.3-fpm
    container_name: wp_app_fpm
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql-wpd-fpm:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG',         true);
        define('WP_DEBUG_LOG',     true);
        define('WP_DEBUG_DISPLAY', true);
        define('MYSQL_CLIENT_FLAGS', 0);
    volumes:
      - wp_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content
    networks:
      - backend-wpd
    extra_hosts:
      - host.docker.internal:host-gateway

  # ───────────────────────────────────────────────
  # Nginx  (reverse proxy to FPM)
  # ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: wp_nginx
    restart: always
    depends_on:
      - wordpress
    ports:
      - "80:80"
    volumes:
      - wp_data:/var/www/html:ro
      - ./wp-content:/var/www/html/wp-content:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - frontend-wpd
      - backend-wpd

  # ───────────────────────────────────────────────
  # WP-CLI setup  (runs once)
  # ───────────────────────────────────────────────
  wp-setup:
    image: wordpress:cli
    container_name: wp_setup_fpm
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    volumes:
      - wp_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./scripts:/scripts
    environment:
      WORDPRESS_DB_HOST: mysql-wpd-fpm:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    user: "0:0"
    entrypoint: ["/bin/bash", "/scripts/wp-setup.sh"]
    restart: "no"
    networks:
      - backend-wpd

  # ───────────────────────────────────────────────
  # Mailpit
  # ───────────────────────────────────────────────
  mailpit:
    container_name: mailpit-fpm
    image: axllent/mailpit:latest
    restart: always
    networks:
      - backend-wpd
      - frontend-wpd
    ports:
      - "1025:1025"
      - "8025:8025"

  # ───────────────────────────────────────────────
  # phpMyAdmin
  # ───────────────────────────────────────────────
  phpmyadmin:
    container_name: phpmyadmin-fpm
    image: phpmyadmin:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: mysql-wpd-fpm
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    networks:
      - backend-wpd
      - frontend-wpd


# ─────────────────────────────────────────────────
networks:
  frontend-wpd:
  backend-wpd:

volumes:
  db_data:
  wp_data:
